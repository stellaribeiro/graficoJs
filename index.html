<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de notas com gráfico</title>

    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Cadastro de Alunos</h1>

    <form id="formAluno">
        <input type="text" id="nome" placeholder="Nome do Aluno" required>
        <input type="number" id="nota1" placeholder="Nota1" required>
        <input type="number" id="nota2" placeholder="Nota2" required>
        <input type="number" id="nota3" placeholder="Nota3" required>
        <button type="submit">Cadastrar</button>
    </form>
    <table>
        <thead>
            <tr>
                <th>Aluno</th>
                <th>Nota 1</th>
                <th>Nota 2</th>
                <th>Nota 3</th>
                <th>Média</th>
                <th>Ações</th>
                <th>Situação</th>
            </tr>
        </thead>

        <tbody id="tabelaAluno">

        </tbody>
    </table>
    <br>
    <canvas id="grafico" width="600" height="300"></canvas>
</body>
</html>
